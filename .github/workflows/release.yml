name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: "9.0.x"
    outputs:
      should_release: ${{ steps.release_meta.outputs.should_release }}
      bump: ${{ steps.release_meta.outputs.bump }}
      previous_version: ${{ steps.release_meta.outputs.previous_version }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      already_released: ${{ steps.already_released.outputs.value }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.base.ref }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Skip when PR is already released
      id: already_released
      run: |
        if git log --oneline --grep="(pr #${{ github.event.pull_request.number }})" -n 1 | grep -q "chore(release):"; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine and apply version bump
      id: release_meta
      if: steps.already_released.outputs.value != 'true'
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        PR_BODY_FILE=$(mktemp)
        printf '%s' "$PR_BODY" > "$PR_BODY_FILE"
        bash scripts/bump_version.sh \
          --title "$PR_TITLE" \
          --body-file "$PR_BODY_FILE" \
          --output "$GITHUB_OUTPUT"

    - name: Stop when PR does not require release
      if: steps.already_released.outputs.value == 'true' || steps.release_meta.outputs.should_release != 'true'
      run: |
        if [ "${{ steps.already_released.outputs.value }}" = "true" ]; then
          echo "PR #${{ github.event.pull_request.number }} is already released; skipping."
          exit 0
        fi
        echo "No release type found in PR title; skipping."
        exit 0

    - name: Restore dependencies
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      run: dotnet restore

    - name: Build
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      run: dotnet build --no-restore --configuration Release

    - name: Test
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      env:
        STREAM_API_KEY: ${{ vars.STREAM_API_KEY }}
        STREAM_API_SECRET: ${{ secrets.STREAM_API_SECRET }}
        CONFIGURATION: Release
      run: make test

    - name: Create NuGet package
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      run: |
        dotnet pack src/stream-feed-net.csproj --configuration Release --no-build --output ./packages
        ls -la ./packages/

    - name: Commit version files
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/stream-feed-net.csproj src/Client.cs
        if git diff --cached --quiet; then
          echo "No version changes to commit."
          exit 0
        fi
        git commit -m "chore(release): v${{ steps.release_meta.outputs.version }} (pr #${{ github.event.pull_request.number }})"
        git push origin "HEAD:${{ github.event.pull_request.base.ref }}"

    - name: Create release tag
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      run: |
        git tag "${{ steps.release_meta.outputs.tag }}"
        git push origin "${{ steps.release_meta.outputs.tag }}"

    - name: Upload NuGet artifacts
      if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: getstream-net-packages-${{ steps.release_meta.outputs.version }}
        path: ./packages/*.nupkg
        if-no-files-found: error

  publish_release:
    name: Publish release
    needs: prepare_release
    if: needs.prepare_release.outputs.already_released != 'true' && needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: "9.0.x"
    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Download NuGet artifacts
      uses: actions/download-artifact@v4
      with:
        name: getstream-net-packages-${{ needs.prepare_release.outputs.version }}
        path: ./packages

    - name: Publish to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [ -z "$NUGET_API_KEY" ]; then
          echo "NUGET_API_KEY secret not set. Skipping NuGet publish."
          exit 0
        fi
        dotnet nuget push ./packages/*.nupkg \
          --api-key "$NUGET_API_KEY" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate \
          --no-symbols \
          --timeout 300

    - name: Create GitHub Release
      env:
        TAG: ${{ needs.prepare_release.outputs.tag }}
        VERSION: ${{ needs.prepare_release.outputs.version }}
        BUMP: ${{ needs.prepare_release.outputs.bump }}
        PREVIOUS: ${{ needs.prepare_release.outputs.previous_version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${TAG}" >/dev/null 2>&1; then
          echo "GitHub release ${TAG} already exists; skipping."
          exit 0
        fi
        RELEASE_NOTES="$(cat <<EOF
        Release v${VERSION}

        - Bump type: ${BUMP}
        - Previous: ${PREVIOUS}
        - Next: ${VERSION}
        EOF
        )"
        gh release create "${TAG}" \
          --title "Release v${VERSION}" \
          --notes "${RELEASE_NOTES}" \
          ./packages/*.nupkg
